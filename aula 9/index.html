<!DOCTYPE html>

<h1>FORMULARIO</h1>
    <form action="#" method="POST">
        Nome: <input type="text" name="nome"><br><br>
        E-mail: <input type="email" name="email"><br><br>
        Senha: <input type="password" name="senha"><br><br>
        Idade: <input type="number" name="idade"><br><br>

        Deixe um comentário:<br>
        <textarea name="comentario" rows="3" cols="30"></textarea><br><br>

        Matéria de interesse: 
        <input type="checkbox" name="materia" value="backend"> Backend
        <input type="checkbox" name="materia" value="frontend"> FrontEnd<br><br>

        Tipo de Viagem: 
        <input type="radio" name="viagem" value="negocios"> Negócios
        <input type="radio" name="viagem" value="lazer"> Lazer<br><br>

        Esporte favorito:
        <select name="esporte" size="3">
            <option value="futebol">Futebol</option>
            <option value="basquete">Basquete</option>
            <option value="tenis" selected>Tênis</option>
        </select><br><br>

        Investimentos:
        <select name="investimentos">
            <option value="poupanca">Poupança</option>
            <option value="acoes">Ações</option>
        </select><br><br>

        Cor: <input type="color" name="cor"> | 
        Arquivo: <input type="file" name="arquivo"><br><br>
        
        Data e Hora: <input type="datetime-local" name="data_hora"><br><br>

        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
    </form>

</body>
</html>
